<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEURAL_OVERRIDE_v9000</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Share+Tech+Mono&display=swap');

    :root {
      --neon: #00ffff;
      --bg-dark: #000808;
      --glow-line: rgba(0, 255, 255, 0.4);
    }

    body, html {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      background: var(--bg-dark); overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      display: flex; align-items: center; justify-content: center;
    }

    canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

    /* The Neural Core */
    .neural-frame {
      position: relative; z-index: 10;
      width: 460px; padding: 1px;
      background: linear-gradient(135deg, var(--neon), transparent, #ff00ff);
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
    }

    .glass-inner {
      background: rgba(0, 10, 15, 0.98);
      padding: 45px; position: relative;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Scanline Effect */
    .glass-inner::after {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 255, 0.05) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 2px, 3px 100%; pointer-events: none;
    }

    h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: 2.2rem; color: #fff; text-align: center;
      letter-spacing: 5px; margin-bottom: 40px;
      text-shadow: 0 0 10px var(--neon);
    }

    .input-field {
      background: transparent; border: none;
      border-left: 3px solid var(--neon);
      background: rgba(0, 255, 255, 0.02);
      color: var(--neon) !important;
      padding: 15px; margin-bottom: 20px;
      border-radius: 0; font-size: 0.9rem;
      transition: 0.4s;
    }

    .input-field:focus {
      background: rgba(0, 255, 255, 0.08);
      box-shadow: 20px 0 50px rgba(0, 255, 255, 0.1);
      outline: none;
    }

    .access-btn {
      background: transparent; border: 1px solid var(--neon);
      color: var(--neon); width: 100%; padding: 18px;
      font-weight: bold; letter-spacing: 10px;
      text-transform: uppercase; cursor: pointer;
      position: relative; transition: 0.5s;
    }

    .access-btn:hover {
      background: var(--neon); color: #000;
      box-shadow: 0 0 100px var(--neon);
      transform: scale(1.02);
    }

    .biometric-readout {
      position: absolute; right: -150px; top: 0;
      width: 120px; font-size: 8px; color: var(--neon);
      opacity: 0.6; border-left: 1px solid var(--neon);
      padding-left: 10px; line-height: 1.5;
    }
  </style>
</head>
<body>

  <canvas id="neuralNet"></canvas>

  <div class="neural-frame" data-tilt data-tilt-max="10" data-tilt-speed="2000">
    <div class="glass-inner">
      <div class="biometric-readout">
        DNA_MATCH: 99.8%<br>
        PULSE_LOCK: STABLE<br>
        NEURAL_SYNC: ACTIVE<br>
        LOCATION: [HIDDEN]
      </div>

      <h1>SYnC_In</h1>

      <form id="authForm">
        <input type="text" class="form-control input-field" placeholder=">_UID" id="uinput">
        <input type="password" class="form-control input-field" placeholder=">_CODE" id="pinput">
        <button type="submit" class="access-btn">Initiate</button>
      </form>
      
      <div class="mt-4 text-center" style="font-size: 9px; letter-spacing: 2px; opacity: 0.4;">
        QUANTUM_STATE: SUPERPOSITIONED // V.9000
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('neuralNet');
    const ctx = canvas.getContext('2d');
    let branches = [];

    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    class Branch {
      constructor(x, y, angle, depth) {
        this.x = x; this.y = y;
        this.angle = angle;
        this.depth = depth;
        this.currX = x; this.currY = y;
        this.speed = Math.random() * 4 + 2;
        this.active = true;
      }

      draw() {
        if (!this.active) return;
        ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + (this.depth * 0.1)})`;
        ctx.lineWidth = this.depth * 0.5;
        ctx.beginPath();
        ctx.moveTo(this.currX, this.currY);
        
        this.currX += Math.cos(this.angle) * this.speed;
        this.currY += Math.sin(this.angle) * this.speed;
        
        ctx.lineTo(this.currX, this.currY);
        ctx.stroke();

        if (Math.random() > 0.97 && this.depth > 0) {
          branches.push(new Branch(this.currX, this.currY, this.angle + (Math.random() - 0.5), this.depth - 1));
          branches.push(new Branch(this.currX, this.currY, this.angle - (Math.random() - 0.5), this.depth - 1));
          this.active = false;
        }

        if (this.currX < 0 || this.currX > canvas.width || this.currY < 0 || this.currY > canvas.height) {
          this.active = false;
        }
      }
    }

    function startGrowth() {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      for(let i=0; i<8; i++) {
        branches.push(new Branch(centerX, centerY, (Math.PI * 2 / 8) * i, 5));
      }
    }

    function animate() {
      branches.forEach(b => b.draw());
      requestAnimationFrame(animate);
    }

    // Trigger growth when user types
    document.getElementById('uinput').addEventListener('input', startGrowth);
    document.getElementById('pinput').addEventListener('input', startGrowth);

    animate();

    // Subtle clear to keep performance smooth
    setInterval(() => {
      ctx.fillStyle = 'rgba(0, 8, 8, 0.02)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }, 100);

    VanillaTilt.init(document.querySelector(".neural-frame"));
  </script>
</body>
</html>
